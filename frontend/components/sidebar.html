<style>
  .sidebar {
    background: var(--navy-deep);
    color: var(--text-inverse);
    display: flex;
    flex-direction: column;
    padding: var(--space-5) var(--space-4);
    min-height: 100vh;
  }
  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: 0 var(--space-2) var(--space-6);
  }
  .sidebar-brand-mark {
    display: inline-flex;
  }
  .sidebar-brand-name {
    font-family: var(--font-display);
    font-size: var(--fs-lg);
    font-weight: 600;
    color: var(--text-inverse);
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
    flex: 1;
  }
  .sidebar-section-label {
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(244, 252, 251, 0.45);
    margin: var(--space-4) var(--space-2) var(--space-2);
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: 0.65rem var(--space-3);
    border-radius: var(--radius-md);
    color: rgba(244, 252, 251, 0.78);
    font-size: var(--fs-sm);
    font-weight: 500;
    text-decoration: none;
    transition: background var(--duration-fast);
    border: none;
    background: none;
    cursor: pointer;
    width: 100%;
    text-align: left;
  }
  .sidebar-link:hover {
    background: rgba(244, 252, 251, 0.08);
    color: var(--text-inverse);
  }
  .sidebar-link.is-active {
    background: var(--steel-blue);
    color: var(--white);
  }
  .sidebar-count {
    margin-left: auto;
    background: rgba(244, 252, 251, 0.16);
    color: var(--text-inverse);
  }

  .sidebar-footer {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }
  .sidebar-promo {
    background: rgba(244, 252, 251, 0.06);
    border-color: rgba(244, 252, 251, 0.14);
  }
  .sidebar-promo h4,
  .sidebar-promo p {
    color: var(--text-inverse);
  }
  .sidebar-promo .eyebrow {
    color: var(--steel-blue-60);
  }
  .sidebar-promo .btn-outline {
    border-color: rgba(244, 252, 251, 0.4);
    color: var(--text-inverse);
  }
  .sidebar-promo .btn-outline:hover {
    background: rgba(244, 252, 251, 0.1);
  }
  .sidebar-logout {
    color: rgba(244, 252, 251, 0.6);
  }

  @media (max-width: 900px) {
    .sidebar {
      position: fixed;
      inset: 0 30% 0 0;
      z-index: 90;
      transform: translateX(-100%);
      transition: transform var(--duration-med) var(--ease-out);
    }
    .sidebar.is-open {
      transform: translateX(0);
    }
  }
</style>
